services:
  - type: web
    name: stay-in-vc
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: TOKEN
        sync: false
      - key: GUILD_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: SELF_MUTE
        sync: false
      - key: SELF_DEAF
        sync: false
